<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Feel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:black;
color:white;
}

.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:40px;
background:
linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.85)),
url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=2070&auto=format&fit=crop');
background-size:cover;
background-position:center;
}

.content{
max-width:900px;
}

h1{
font-size:80px;
margin-bottom:25px;
background:linear-gradient(to right,#ffd700,#ff4fd8,#8b5cf6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

p{
font-size:20px;
line-height:1.9;
color:#e0e0e0;
margin-bottom:40px;
}

a{
display:inline-block;
padding:15px 35px;
border-radius:18px;
background:linear-gradient(to right,#ff00aa,#6a00ff);
color:white;
text-decoration:none;
font-weight:600;
transition:0.4s;
}

a:hover{
transform:translateY(-5px);
}
</style>
</head>

<body>

<section class="hero">

<div class="content">

<h1>Luxury Feel</h1>

<p>
Cinematic visuals, glowing premium gradients,
elegant spacing and immersive interactions designed
for unforgettable luxury branding experiences.
</p>

<a href="index.html">Back Home</a>

</div>

</section>

</body>
</html>
